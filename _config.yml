# --- Site ---
title: Nick Chow
author: Nicholas Chow
url: "https://nicholasachow.com"
description: "Essays on AI, investing, tennis, and craft by Nicholas Chow — Director of Research at Altos Ventures."
keywords: "Nicholas Chow, AI, investing, tennis, essays, Altos Ventures, technology"

# Default OG share image
avatar: "/assets/img/og-card.png"

# --- Navigation ---
navbar-links:
  About Me: "aboutme"
  Essays: "blog"
  Projects: "projects"
  Writing: "writing"

# --- General ---
title-on-all-pages: true
remove-ads: true
url-pretty: "nicholasachow.com"
rss-description: "Essays on AI, investing, tennis, and craft by Nicholas Chow."
post_search: false
edit_page_button: false
excerpt_length: 50
feed_show_excerpt: false
feed_show_tags: false
date_format: "%B %-d, %Y"

# --- Colours ---
page-col: "#FFFFFF"
text-col: "#000000"
link-col: "#0000FF"
hover-col: "#0000CC"
navbar-col: "#FFFFFF"
navbar-text-col: "#0000FF"
navbar-border-col: "#FFFFFF"
footer-col: "#FFFFFF"
footer-text-col: "#000000"
footer-link-col: "#0000FF"
footer-hover-col: "#0000CC"

# --- CSS ---
site-css:
  - "/assets/css/custom-styles.css"

# --- Build ---
timezone: "America/Los_Angeles"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/

kramdown:
  input: GFM
  auto_ids: true
  toc_levels: "2..3"

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  -
    scope:
      path: ""
    values:
      layout: "page"

exclude:
  - CHANGELOG.md
  - CLAUDE.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - screenshot.png
  - docs/

plugins:
  - jekyll-paginate
  - jekyll-sitemap
